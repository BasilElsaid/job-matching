<mat-toolbar color="primary">
  <span class="logo">Job Matching</span>

  <span class="spacer"></span>

  <button mat-button routerLink="/">Home</button>
  <button mat-button routerLink="/jobs">Annunci</button>

  <!-- 🔵 Dashboard → solo se loggato -->
  <button
    mat-button
    routerLink="/dashboard"
    *ngIf="authService.isAuthenticated() && !authService.isAdmin()"
  >
    Dashboard
  </button>

  <!-- 🟢 Register → solo se NON loggato -->
  <button
    mat-button
    routerLink="/register"
    *ngIf="!authService.isAuthenticated()"
  >
    Registrati
  </button>

  <!-- 🔴 Admin → solo se admin -->
  <button mat-button routerLink="/admin" *ngIf="authService.isAdmin()">
    Admin
  </button>

  <!-- 🔵 Login -->
  <button
    mat-stroked-button
    color="accent"
    *ngIf="!authService.isAuthenticated()"
    routerLink="/login"
  >
    Login
  </button>

  <!-- 🔴 Logout -->
  <button
    mat-raised-button
    color="warn"
    *ngIf="authService.isAuthenticated()"
    (click)="logout()"
  >
    Logout
  </button>
</mat-toolbar>

<div class="layout-content">
  <router-outlet></router-outlet>
</div>

<footer class="footer">
  © 2026 Job Matching | Built with Angular & Material
</footer>
