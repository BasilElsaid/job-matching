<mat-card *ngIf="!loading && job" class="detail-card">
  <!-- HEADER -->
  <div class="card-header">
    <div>
      <mat-card-title>{{ job.title }}</mat-card-title>
      <mat-card-subtitle>
        📍 {{ job.location }} | 🏢 {{ job.companyId?.companyName }}
      </mat-card-subtitle>
    </div>

    <!-- Tipo contratto come badge -->
    <span class="job-type">
      {{ job.type }}
    </span>
  </div>

  <!-- BODY -->
  <mat-card-content>
    <div class="meta-info">
      <span>
        📅 Pubblicato:
        {{ job.createdAt | date: "dd/MM/yyyy HH:mm" }}
      </span>
    </div>

    <h3 class="section-title">Descrizione</h3>
    <p class="description">
      {{ job.description }}
    </p>
  </mat-card-content>

  <mat-divider></mat-divider>

  <!-- CONTACT -->
  <mat-card-actions class="contact-section">
    <h3>Contattaci</h3>

    <p *ngIf="job.companyId?.companyEmail">
      📩
      <a [href]="'mailto:' + job.companyId?.companyEmail">
        {{ job.companyId?.companyEmail }}
      </a>
    </p>

    <p *ngIf="job.companyId?.companyPhone">
      📞
      <a [href]="'tel:' + job.companyId?.companyPhone">
        {{ job.companyId?.companyPhone }}
      </a>
    </p>
  </mat-card-actions>
</mat-card>
