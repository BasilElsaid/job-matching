<div class="min-h-screen bg-slate-50 px-6 py-10">

  <div class="max-w-3xl mx-auto">

    <!-- BACK -->
    <button
      routerLink="/company/dashboard"
      class="text-blue-600 hover:underline text-sm mb-6">
      ← Torna alla Dashboard
    </button>

    <!-- CARD -->
    <div class="bg-white border rounded-xl shadow-sm p-6">

      <h2 class="text-xl font-bold text-slate-900">
        Crea annuncio di lavoro
      </h2>

      <!-- WARNING -->
      <div class="mt-4 p-4 rounded-lg bg-amber-50 border border-amber-200 text-sm text-amber-800">
        Attenzione: l'annuncio sarà visibile solo dopo approvazione amministratore.
      </div>

      <form [formGroup]="jobForm" (ngSubmit)="onSubmit()" class="mt-6 space-y-5">

        <!-- TITLE -->
        <div>
          <label class="text-sm text-slate-600">Titolo Annuncio</label>
          <input
            formControlName="title"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- LOCATION -->
        <div>
          <label class="text-sm text-slate-600">Luogo di Lavoro</label>
          <input
            formControlName="location"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- TYPE -->
        <div>
          <label class="text-sm text-slate-600">Tipo Contratto</label>
          <input
            formControlName="type"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- DESCRIPTION -->
        <div>
          <label class="text-sm text-slate-600">Descrizione</label>
          <textarea
            rows="5"
            formControlName="description"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <!-- LINK -->
        <div>
          <label class="text-sm text-slate-600">Link di riferimento</label>
          <input
            type="url"
            formControlName="referenceLink"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

          <p *ngIf="jobForm.get('referenceLink')?.hasError('pattern')"
             class="text-xs text-red-500 mt-1">
            Inserisci un link valido (https://...)
          </p>
        </div>

        <!-- EXPIRY -->
        <div>
          <label class="text-sm text-slate-600">Data Scadenza</label>
          <input
            type="date"
            formControlName="expiresAt"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />

          <p *ngIf="jobForm.get('expiresAt')?.hasError('min30days')"
             class="text-xs text-red-500 mt-1">
            La scadenza deve essere almeno tra 30 giorni
          </p>
        </div>

        <!-- COMPANY INFO -->
        <div class="p-4 rounded-lg bg-slate-50 border text-sm text-slate-700">
          <h3 class="font-semibold mb-2">Dati Aziendali</h3>
          <p>📧 {{ company.companyEmail }}</p>
          <p>📞 {{ company.companyPhone }}</p>
        </div>

        <!-- ACTION -->
        <div class="pt-2 flex justify-end">
          <button
            type="submit"
            [disabled]="jobForm.invalid"
            class="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">
            Pubblica Annuncio
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
