<div class="create-container">
  <mat-card class="create-card">
    <h2>Crea annuncio di lavoro</h2>

    <form [formGroup]="jobForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Titolo Lavoro</mat-label>
        <input matInput formControlName="title" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Posizione</mat-label>
        <input matInput formControlName="location" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Tipo Contratto</mat-label>
        <input matInput formControlName="type" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Descrizione</mat-label>
        <textarea matInput rows="5" formControlName="description"> </textarea>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email di contatto</mat-label>
        <input matInput type="email" formControlName="companyEmail" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Telefono di contatto</mat-label>
        <input matInput formControlName="companyPhone" />
      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        class="full-width"
        [disabled]="jobForm.invalid"
      >
        Pubblica Annuncio
      </button>
    </form>
  </mat-card>
</div>
