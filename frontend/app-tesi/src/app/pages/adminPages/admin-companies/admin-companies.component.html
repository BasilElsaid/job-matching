<div class="min-h-screen bg-slate-50 px-6 py-12">

  <div class="max-w-6xl mx-auto">

    <!-- BACK -->
    <button
      routerLink="/admin"
      class="text-blue-600 hover:underline text-sm"
    >
      ← Torna alla pagina Admin
    </button>

    <!-- TITLE -->
    <h2 class="text-3xl font-bold text-slate-900 mt-6">
      Aziende Registrate
    </h2>

    <!-- EMPTY -->
    <div *ngIf="companies.length === 0" class="mt-8 text-slate-500">
      Nessuna azienda registrata.
    </div>

    <!-- GRID -->
    <div class="mt-8 grid gap-6 md:grid-cols-2 lg:grid-cols-3">

      <div
        *ngFor="let company of companies"
        class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition"
      >

        <!-- HEADER -->
        <h3 class="text-lg font-semibold text-slate-900">
          {{ company.companyName }}
        </h3>

        <p class="text-sm text-slate-500 mt-1">
          Login: {{ company.email }}
        </p>

        <!-- INFO -->
        <div class="mt-4 space-y-2 text-sm text-slate-700">

          <p>
            📧 <span class="text-slate-600">{{ company.companyEmail }}</span>
          </p>

          <p>
            📞 <span class="text-slate-600">{{ company.companyPhone }}</span>
          </p>

          <p>
            📍 <span class="text-slate-600">{{ company.companyAddress }}</span>
          </p>

        </div>

        <!-- ACTION -->
        <div class="mt-5">

          <button
            (click)="deleteCompany(company._id)"
            class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition"
          >
            Elimina
          </button>

        </div>

      </div>

    </div>

  </div>
</div>
