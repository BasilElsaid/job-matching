<div class="jobs-container">
  <h2>Annunci Disponibili</h2>

  <div *ngIf="loading">Carico annunci...</div>

  <div class="jobs-grid" *ngIf="!loading">
    <mat-card class="job-card" *ngFor="let job of jobs">
      <mat-card-title>
        {{ job.title }}
      </mat-card-title>

      <mat-card-subtitle> 📍 {{ job.location }} </mat-card-subtitle>

      <mat-card-content>
        <p>{{ job.description }}</p>
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-stroked-button
          color="primary"
          [routerLink]="['/jobs', job._id]"
        >
          Mostra Dettagli
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
