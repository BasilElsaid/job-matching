<section class="min-h-screen bg-[#f5f7fa] flex items-center justify-center px-6 py-16">

  <div class="w-full max-w-2xl">

    <!-- CARD -->
    <div class="bg-white border border-slate-100 shadow-md rounded-2xl p-10">

      <!-- HEADER -->
      <div class="text-center mb-10">
        <h2 class="text-2xl font-semibold text-slate-800">
          Registrazione Azienda
        </h2>
        <p class="text-slate-500 mt-2 text-sm">
          Crea il tuo account per pubblicare annunci di lavoro
        </p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-8">

        <!-- LOGIN SECTION -->
        <div>
          <h3 class="text-sm font-semibold text-slate-700 mb-4">
            Informazioni di Login
          </h3>

          <div class="space-y-4">

            <!-- EMAIL -->
            <div>
              <label class="text-sm text-slate-600">Email</label>
              <input
                type="email"
                formControlName="email"
                class="w-full mt-1 px-4 py-3 rounded-lg border border-slate-200
                       focus:outline-none focus:ring-2 focus:ring-blue-500"
              />

              <p class="text-red-500 text-xs mt-1"
                 *ngIf="registerForm.get('email')?.hasError('required')">
                Email obbligatoria
              </p>

              <p class="text-red-500 text-xs mt-1"
                 *ngIf="registerForm.get('email')?.hasError('email')">
                Email non valida
              </p>

              <p class="text-red-500 text-xs mt-1"
                 *ngIf="registerForm.get('email')?.hasError('emailTaken')">
                Questa email è già registrata
              </p>
            </div>

            <!-- PASSWORD -->
            <div>
              <label class="text-sm text-slate-600">Password</label>
              <input
                type="password"
                formControlName="password"
                class="w-full mt-1 px-4 py-3 rounded-lg border border-slate-200
                       focus:outline-none focus:ring-2 focus:ring-blue-500"
              />

              <p class="text-red-500 text-xs mt-1" *ngIf="getPasswordError()">
                {{ getPasswordError() }}
              </p>
            </div>

            <!-- CONFIRM -->
            <div>
              <label class="text-sm text-slate-600">Conferma Password</label>
              <input
                type="password"
                formControlName="confirmPassword"
                class="w-full mt-1 px-4 py-3 rounded-lg border border-slate-200
                       focus:outline-none focus:ring-2 focus:ring-blue-500"
              />

              <p class="text-red-500 text-xs mt-1"
                 *ngIf="registerForm.errors?.['mismatch']">
                Le password non coincidono
              </p>
            </div>

          </div>
        </div>

        <!-- COMPANY SECTION -->
        <div>
          <h3 class="text-sm font-semibold text-slate-700 mb-4">
            Informazioni Azienda
          </h3>

          <div class="space-y-4">

            <input formControlName="companyName" placeholder="Nome Azienda"
              class="w-full px-4 py-3 rounded-lg border border-slate-200
                     focus:outline-none focus:ring-2 focus:ring-blue-500" />

            <input type="email" formControlName="companyEmail" placeholder="Email Aziendale"
              class="w-full px-4 py-3 rounded-lg border border-slate-200
                     focus:outline-none focus:ring-2 focus:ring-blue-500" />

            <input formControlName="companyPhone" placeholder="Telefono Aziendale"
              class="w-full px-4 py-3 rounded-lg border border-slate-200
                     focus:outline-none focus:ring-2 focus:ring-blue-500" />

            <p class="text-red-500 text-xs"
               *ngIf="registerForm.get('companyPhone')?.hasError('pattern')">
              Numero telefono invalido
            </p>

            <input formControlName="companyAddress" placeholder="Indirizzo"
              class="w-full px-4 py-3 rounded-lg border border-slate-200
                     focus:outline-none focus:ring-2 focus:ring-blue-500" />

          </div>
        </div>

        <!-- BUTTON -->
        <button
          type="submit"
          class="w-full py-3 rounded-lg bg-blue-600 text-white font-medium
                 shadow-sm hover:bg-blue-700 transition"
        >
          Registra
        </button>

      </form>

    </div>

  </div>

</section>
