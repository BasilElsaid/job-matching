<section class="min-h-screen bg-[#f5f7fa] px-6 py-16">

  <div class="max-w-6xl mx-auto">

    <!-- HEADER -->
    <div class="mb-10 text-center">
      <h2 class="text-3xl font-semibold text-slate-800">
        Annunci Disponibili
      </h2>
      <p class="text-slate-500 mt-2 text-sm">
        Scopri le opportunità aperte dalle aziende
      </p>
    </div>

    <!-- LOADING -->
    <div *ngIf="loading" class="text-center text-slate-500">
      Carico annunci...
    </div>

    <!-- GRID -->
    <div *ngIf="!loading" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">

      <div
        *ngFor="let job of jobs"
        class="bg-white border border-slate-100 rounded-2xl shadow-sm
               p-6 hover:shadow-md transition hover:-translate-y-1"
      >

        <!-- TITLE -->
        <h3 class="text-lg font-semibold text-slate-800">
          {{ job.title }}
        </h3>

        <!-- LOCATION -->
        <p class="text-slate-500 text-sm mt-2">
          📍 {{ job.location }}
        </p>

        <!-- FOOTER -->
        <div class="mt-6 flex justify-end">
          <button
            [routerLink]="['/jobs', job._id]"
            class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium
                   hover:bg-blue-700 transition"
          >
            Mostra dettagli
          </button>
        </div>

      </div>

    </div>

  </div>

</section>
