<section class="min-h-screen bg-[#f5f7fa] px-6 py-16">
  <div class="max-w-6xl mx-auto">
    <!-- HEADER -->
    <div class="mb-10 text-center">
      <h2 class="text-3xl font-semibold text-slate-800">Annunci Disponibili</h2>
      <p class="text-slate-500 mt-2 text-sm">
        Scopri le opportunità aperte dalle aziende
      </p>
    </div>

    <!-- LOADING -->
    <div *ngIf="loading" class="text-center text-slate-500">
      Carico annunci...
    </div>

    <!-- GRID -->
    <div *ngIf="!loading" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
      <div
        *ngFor="let job of jobs"
        class="bg-white border border-slate-100 rounded-2xl shadow-sm p-6 hover:shadow-md transition hover:-translate-y-1"
      >
        <!-- TITLE -->
        <h3 class="text-lg font-semibold text-slate-800 flex justify-center">
          {{ job.title }}
        </h3>

        <!-- LOCATION -->
        <div
          class="flex justify-center items-center gap-2 mt-2 text-sm text-slate-500"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-5 h-5 flex-shrink-0"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
            />
          </svg>

          <span>{{ job.location }}</span>
        </div>

        <div class="flex justify-center items-center gap-2 mt-2 text-sm text-slate-500">
          <div class="flex items-center gap-2 mt-2 text-sm text-slate-500">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21"
              />
            </svg>
            <span>{{ job.companyId?.companyName }}</span>
          </div>
        </div>

        <!-- FOOTER -->
        <div class="mt-6 flex justify-center">
          <button
            [routerLink]="['/jobs', job._id]"
            class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 transition"
          >
            Mostra dettagli
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
